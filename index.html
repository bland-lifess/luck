<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pier & Line</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
body {
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'VT323', monospace;
  overflow: hidden;
  user-select: none;
}
#game-canvas {
  display: block;
  cursor: pointer;
}
#ui-overlay {
  position: fixed;
  top: 12px; left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  z-index: 10;
  pointer-events: none;
}
.hud-chip {
  background: rgba(0,0,0,0.8);
  border: 2px solid #4ecdc4;
  border-radius: 4px;
  padding: 4px 10px;
  color: #4ecdc4;
  font-family: 'VT323', monospace;
  font-size: 1.05rem;
}
.hud-chip span { color: #f7c948; }
#tab-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  display: flex;
  background: rgba(0,0,0,0.95);
  border-top: 2px solid #1a3a4a;
  z-index: 20;
}
.tab-btn {
  flex: 1;
  padding: 10px 4px;
  border: none;
  background: transparent;
  color: #4a6a7a;
  font-family: 'VT323', monospace;
  font-size: 1rem;
  cursor: pointer;
  transition: color 0.15s;
}
.tab-btn.active { color: #4ecdc4; border-top: 2px solid #4ecdc4; margin-top: -2px; }
.tab-btn:hover { color: #7ee8e0; }
.side-panel {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 48px;
  background: #020e18;
  z-index: 15;
  overflow-y: auto;
  padding: 16px;
}
.side-panel.open { display: block; }
.panel-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 0.65rem;
  color: #4ecdc4;
  margin-bottom: 14px;
  letter-spacing: 0.1em;
}
.inv-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
}
.inv-card {
  background: #071828;
  border: 1px solid #1a3a4a;
  border-radius: 4px;
  padding: 10px 8px;
  text-align: center;
  position: relative;
}
.inv-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--rc);
  border-radius: 4px 4px 0 0;
}
.inv-emoji { font-size: 1.8rem; }
.inv-name { font-family: 'VT323', monospace; font-size: 0.85rem; color: #cde; margin: 4px 0 2px; }
.inv-count { font-size: 0.75rem; color: #6a9ab0; }
.inv-val { font-size: 0.75rem; color: #f7c948; }
.inv-sell {
  margin-top: 5px;
  padding: 3px 10px;
  background: rgba(247,201,72,0.1);
  border: 1px solid rgba(247,201,72,0.4);
  border-radius: 3px;
  color: #f7c948;
  font-family: 'VT323', monospace;
  font-size: 0.8rem;
  cursor: pointer;
}
.inv-sell:hover { background: rgba(247,201,72,0.25); }
.sell-all-btn {
  display: block;
  width: 100%;
  margin-top: 14px;
  padding: 10px;
  background: rgba(247,201,72,0.1);
  border: 1px solid #f7c948;
  border-radius: 4px;
  color: #f7c948;
  font-family: 'VT323', monospace;
  font-size: 1.1rem;
  cursor: pointer;
}
.sell-all-btn:hover { background: rgba(247,201,72,0.2); }
.rods-list { display: flex; flex-direction: column; gap: 8px; }
.rod-card {
  background: #071828;
  border: 1px solid #1a3a4a;
  border-radius: 4px;
  padding: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.rod-card.equipped { border-color: #f7c948; }
.rod-card.owned { border-color: #4ecdc4; }
.rod-icon-big { font-size: 1.8rem; flex-shrink: 0; }
.rod-info { flex: 1; }
.rod-nm { font-family: 'VT323', monospace; font-size: 1rem; color: #cde; }
.rod-dsc { font-size: 0.75rem; color: #6a9ab0; font-family: 'VT323', monospace; margin: 2px 0 6px; }
.rod-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.rod-tag {
  padding: 1px 6px;
  border: 1px solid #1a3a5a;
  border-radius: 2px;
  font-size: 0.65rem;
  color: #4ecdc4;
  font-family: 'VT323', monospace;
}
.rod-act {
  padding: 6px 12px;
  border: 1px solid;
  border-radius: 3px;
  font-family: 'VT323', monospace;
  font-size: 0.85rem;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
.rod-act.buy { border-color: #f7c948; color: #f7c948; background: rgba(247,201,72,0.08); }
.rod-act.buy:hover { background: rgba(247,201,72,0.2); }
.rod-act.equip { border-color: #4ecdc4; color: #4ecdc4; background: rgba(78,205,196,0.08); }
.rod-act.equip:hover { background: rgba(78,205,196,0.2); }
.rod-act.eqd { border-color: rgba(247,201,72,0.3); color: #f7c948; background: transparent; cursor: default; }
.rod-act:disabled { opacity: 0.35; cursor: not-allowed; }
.lb-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; margin-bottom: 6px;
  background: #071828; border: 1px solid #1a3a4a; border-radius: 4px;
}
.lb-row.me { border-color: rgba(247,201,72,0.5); }
.lb-rank-num { font-family: 'VT323', monospace; font-size: 1.1rem; width: 26px; text-align: center; flex-shrink: 0; }
.lb-nm { flex: 1; font-family: 'VT323', monospace; font-size: 1rem; color: #cde; }
.lb-sc { font-family: 'VT323', monospace; font-size: 1rem; color: #f7c948; }
.lb-sub {
  margin-top: 16px; padding: 12px;
  background: #071828; border: 1px solid #1a3a4a; border-radius: 4px;
  text-align: center;
}
.lb-sub input {
  background: rgba(255,255,255,0.05);
  border: 1px solid #4ecdc4;
  border-radius: 3px;
  padding: 7px 12px;
  color: #cde;
  font-family: 'VT323', monospace;
  font-size: 1rem;
  width: 150px;
  outline: none;
  margin-right: 6px;
  margin-bottom: 6px;
}
.lb-sub button {
  padding: 7px 16px;
  background: rgba(78,205,196,0.1);
  border: 1px solid #4ecdc4;
  border-radius: 3px;
  color: #4ecdc4;
  font-family: 'VT323', monospace;
  font-size: 1rem;
  cursor: pointer;
}
.lb-sub button:hover { background: rgba(78,205,196,0.2); }
.empty-msg { text-align: center; padding: 32px; color: #4a6a7a; font-family: 'VT323', monospace; }
#toast {
  position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: rgba(0,0,0,0.92); border: 1px solid #4ecdc4;
  border-radius: 4px; padding: 7px 18px;
  color: #4ecdc4; font-family: 'VT323', monospace; font-size: 1.05rem;
  z-index: 99; opacity: 0; transition: all 0.3s; pointer-events: none;
  white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<canvas id="game-canvas"></canvas>
<div id="ui-overlay">
  <div class="hud-chip">💰 <span id="hud-gold">0</span>g</div>
  <div class="hud-chip">🐟 <span id="hud-caught">0</span></div>
  <div class="hud-chip" id="hud-rod-chip">🪵 Drift</div>
</div>
<div id="tab-bar">
  <button class="tab-btn active" onclick="openTab('game')">🎣 Fish</button>
  <button class="tab-btn" onclick="openTab('inv')">🐠 Haul</button>
  <button class="tab-btn" onclick="openTab('rods')">⚓ Rods</button>
  <button class="tab-btn" onclick="openTab('lb')">🏆 Board</button>
</div>
<div class="side-panel" id="panel-inv">
  <div class="panel-title">— Your Catch —</div>
  <div class="inv-grid" id="inv-grid"></div>
  <button class="sell-all-btn" onclick="sellAll()">Sell All Fish</button>
</div>
<div class="side-panel" id="panel-rods">
  <div class="panel-title">— Rod Outfitter —</div>
  <div class="rods-list" id="rods-list"></div>
</div>
<div class="side-panel" id="panel-lb">
  <div class="panel-title">— Global Board — <button onclick="loadLB()" style="margin-left:8px;padding:2px 8px;background:rgba(78,205,196,0.1);border:1px solid #4ecdc4;border-radius:3px;color:#4ecdc4;font-family:'VT323',monospace;font-size:0.85rem;cursor:pointer;">↻</button></div>
  <div id="lb-rows"></div>
  <div class="lb-sub">
    <div style="color:#6a9ab0;font-size:0.9rem;margin-bottom:8px;font-family:'VT323',monospace;">Submit your net worth to the board</div>
    <input type="text" id="lb-name" placeholder="Angler name" maxlength="18">
    <button onclick="submitLB()">Submit</button>
  </div>
</div>
<div id="toast"></div>

<script>
// =============================================
// DATA
// =============================================
const FISH = [
  {id:'minnow',    name:'Minnow',          e:'🐟', r:'common',    v:5,    w:50, diff:0.18, desc:'Tiny and plentiful.'},
  {id:'bluegill',  name:'Bluegill',         e:'🐠', r:'common',    v:8,    w:48, diff:0.20, desc:'Feisty panfish.'},
  {id:'perch',     name:'Yellow Perch',     e:'🐡', r:'common',    v:10,   w:45, diff:0.22, desc:'Schooling fish.'},
  {id:'carp',      name:'Common Carp',      e:'🐟', r:'common',    v:12,   w:42, diff:0.22, desc:'Ancient bottom-feeder.'},
  {id:'roach',     name:'Roach',            e:'🐠', r:'common',    v:7,    w:44, diff:0.19, desc:'Silver-scaled.'},
  {id:'bass',      name:'Largemouth Bass',  e:'🐟', r:'uncommon',  v:25,   w:30, diff:0.27, desc:'King of sport fishing.'},
  {id:'trout',     name:'Rainbow Trout',    e:'🐠', r:'uncommon',  v:28,   w:28, diff:0.28, desc:'Cold mountain streams.'},
  {id:'catfish',   name:'Channel Catfish',  e:'🐡', r:'uncommon',  v:22,   w:30, diff:0.26, desc:'Nocturnal prowler.'},
  {id:'pike',      name:'Northern Pike',    e:'🐟', r:'uncommon',  v:35,   w:22, diff:0.30, desc:'Ambush predator.'},
  {id:'walleye',   name:'Walleye',          e:'🐠', r:'uncommon',  v:30,   w:24, diff:0.29, desc:'Glass eyes in the deep.'},
  {id:'crappie',   name:'Black Crappie',    e:'🐡', r:'uncommon',  v:20,   w:28, diff:0.25, desc:'Speckled and delicate.'},
  {id:'salmon',    name:'Atlantic Salmon',  e:'🐟', r:'rare',      v:65,   w:14, diff:0.34, desc:'A legendary fighter.'},
  {id:'sturgeon',  name:'Lake Sturgeon',    e:'🦈', r:'rare',      v:80,   w:12, diff:0.36, desc:'A living fossil.'},
  {id:'eel',       name:'American Eel',     e:'🐍', r:'rare',      v:55,   w:14, diff:0.33, desc:'Sinuous and elusive.'},
  {id:'muskie',    name:'Muskellunge',      e:'🐟', r:'rare',      v:90,   w:10, diff:0.38, desc:'Fish of ten thousand casts.'},
  {id:'steelhead', name:'Steelhead Trout',  e:'🐠', r:'rare',      v:70,   w:12, diff:0.35, desc:'Chrome-bright.'},
  {id:'tuna',      name:'Bluefin Tuna',     e:'🐟', r:'epic',      v:220,  w:5,  diff:0.42, desc:'The ocean apex.'},
  {id:'marlin',    name:'Blue Marlin',      e:'🐬', r:'epic',      v:280,  w:4,  diff:0.44, desc:'Ultimate ocean trophy.'},
  {id:'halibut',   name:'Pacific Halibut',  e:'🐡', r:'epic',      v:200,  w:5,  diff:0.41, desc:'Largest flatfish.'},
  {id:'tarpon',    name:'Silver King',      e:'🐠', r:'epic',      v:250,  w:4,  diff:0.43, desc:'Leaps 10 feet out.'},
  {id:'coelacanth',name:'Coelacanth',       e:'🐟', r:'epic',      v:350,  w:3,  diff:0.46, desc:'Thought extinct.'},
  {id:'oarfish',   name:'Oarfish',          e:'🐉', r:'legendary', v:750,  w:1.5,diff:0.50, desc:'The mythical sea serpent.'},
  {id:'sunfish',   name:'Ocean Sunfish',    e:'🐡', r:'legendary', v:600,  w:1.5,diff:0.49, desc:'Drifts like an alien moon.'},
  {id:'arapaima',  name:'Arapaima',         e:'🐟', r:'legendary', v:800,  w:1,  diff:0.52, desc:'Armored river giant.'},
  {id:'angler',    name:'Anglerfish',       e:'🫧', r:'legendary', v:900,  w:1,  diff:0.53, desc:'Lures prey in the void.'},
  {id:'dragon',    name:'Sea Dragon',       e:'🐲', r:'mythic',    v:5000, w:0.3,diff:0.58, desc:'Ancient guardian.'},
  {id:'kraken',    name:'Kraken Spawn',     e:'🦑', r:'mythic',    v:8000, w:0.2,diff:0.62, desc:'Fragment of an elder god.'},
  {id:'leviathan', name:'Leviathan Scale',  e:'🌊', r:'mythic',    v:12000,w:0.1,diff:0.68, desc:'No name. No record.'},
];
const RC  = {common:'#7ecba1',uncommon:'#5bc0eb',rare:'#b44fec',epic:'#ff6b35',legendary:'#ff2d55',mythic:'#ff9f1c'};
const RL  = {common:'Common',uncommon:'Uncommon',rare:'Rare',epic:'Epic',legendary:'Legendary',mythic:'✦ Mythic'};
const RODS = [
  {id:'driftwood', name:'Driftwood',    e:'🪵', price:0,     luck:1.0, speed:1.0,  greenH:0.28, desc:'A gnarled branch.'},
  {id:'bamboo',    name:'Bamboo Cane',  e:'🎋', price:80,    luck:1.1, speed:1.1,  greenH:0.29, desc:'Springy and light.'},
  {id:'fiberglass',name:'Fiberglass',   e:'🎣', price:200,   luck:1.25,speed:1.2,  greenH:0.31, desc:'Reliable workhorse.'},
  {id:'carbon',    name:'Carbon Fiber', e:'⚙️', price:500,   luck:1.5, speed:1.35, greenH:0.33, desc:'Feel every nibble.'},
  {id:'titanium',  name:'Titanium Pro', e:'🔱', price:1200,  luck:1.8, speed:1.5,  greenH:0.36, desc:'Tournament grade.'},
  {id:'crystal',   name:'Crystal Rod',  e:'💎', price:3000,  luck:2.2, speed:1.7,  greenH:0.39, desc:'Ocean magic.'},
  {id:'abyssal',   name:'Abyssal Spire',e:'🌊', price:7500,  luck:3.0, speed:2.0,  greenH:0.43, desc:'Sea serpent forged.'},
  {id:'divine',    name:'Leviathan',    e:'⚡', price:20000, luck:4.5, speed:2.5,  greenH:0.48, desc:'End of the world.'},
];

// =============================================
// SAVE STATE
// =============================================
let S = {
  gold:0, totalCaught:0,
  equippedRod:'driftwood',
  ownedRods:['driftwood'],
  inventory:{},
  totalEarned:0,
};
function save(){localStorage.setItem('pl_v3',JSON.stringify(S));}
function load(){try{const d=localStorage.getItem('pl_v3');if(d)S={...S,...JSON.parse(d)};}catch(e){}}
function getRod(){return RODS.find(r=>r.id===S.equippedRod);}
function netWorth(){let w=S.gold;for(const[id,c]of Object.entries(S.inventory)){const f=FISH.find(x=>x.id===id);if(f)w+=f.v*c;}return w;}
function fmt(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'k';return Math.floor(n)+'';}
function rollFish(){
  const rod=getRod();
  const pool=FISH.map(f=>{let w=f.w*rod.luck;if(f.r!=='common')w*=(1+(rod.luck-1)*0.3);return{f,w};});
  const tot=pool.reduce((a,b)=>a+b.w,0);
  let r=Math.random()*tot;
  for(const{f,w}of pool){r-=w;if(r<=0)return f;}
  return FISH[0];
}
function updateHUD(){
  document.getElementById('hud-gold').textContent=fmt(S.gold);
  document.getElementById('hud-caught').textContent=fmt(S.totalCaught);
  const rod=getRod();
  document.getElementById('hud-rod-chip').textContent=rod.e+' '+rod.name.split(' ')[0];
}

// =============================================
// CANVAS SETUP
// =============================================
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){
  W=canvas.width=Math.min(window.innerWidth,500);
  H=canvas.height=window.innerHeight-48;
}
window.addEventListener('resize',()=>{resize();});
resize();

// =============================================
// GAME STATE
// =============================================
// States: idle | casting | waiting | reeling | result
let gState = 'idle';
let currentFish = null;
let waitTimer = 0;
let biteT = 0;

// Cast animation
let castAnim = 0; // 0->1

// Reel state
const R = {
  notchY: 0.5,    // normalized 0=top 1=bottom
  notchVel: 0,
  greenY: 0.4,    // center of green zone normalized
  greenVel: 0,
  greenH: 0.3,    // height of green zone normalized
  progress: 0,    // 0->1 fill bar
  holding: false,
  escTimer: 0,    // frames out of zone
  fillSpeed: 0,
  drainSpeed: 0,
  greenSpeed: 0,
};

// Result state
let resSuccess = false;
let resFish = null;
let resTimer = 0;

// =============================================
// INPUT
// =============================================
let pointerHeld = false;

function onDown(e){
  e.preventDefault();
  pointerHeld = true;
  R.holding = true;
  if(gState==='idle') startCast();
  else if(gState==='result') resetToIdle();
}
function onUp(e){
  e.preventDefault();
  pointerHeld = false;
  R.holding = false;
}
canvas.addEventListener('pointerdown', onDown, {passive:false});
canvas.addEventListener('pointerup',   onUp,   {passive:false});
canvas.addEventListener('pointercancel',onUp,  {passive:false});
// also support mouse
canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mouseup',   onUp);

function startCast(){
  if(gState!=='idle') return;
  gState='casting';
  castAnim=0;
  currentFish=rollFish();
  const rod=getRod();
  waitTimer=(1000+Math.random()*1400)/rod.speed;
}

function startReel(){
  gState='reeling';
  const rod=getRod();
  R.notchY=0.5; R.notchVel=0;
  R.greenY=0.3+Math.random()*0.4;
  R.greenH=rod.greenH;
  R.greenVel=(Math.random()<0.5?1:-1)*0.0004;
  R.progress=0;
  R.escTimer=0;
  const d=currentFish.diff;
  R.fillSpeed  = 0.0028;
  R.drainSpeed = 0.0016 + d*0.004;
  R.greenSpeed = 0.0006 + d*0.001;
}

function endReel(success){
  resSuccess=success;
  resFish=currentFish;
  gState='result';
  resTimer=5000;
  if(success){
    S.inventory[currentFish.id]=(S.inventory[currentFish.id]||0)+1;
    S.totalCaught++;
    save(); updateHUD();
    showToast(currentFish.e+' '+currentFish.name+' — '+RL[currentFish.r]+'!');
  } else {
    showToast('The fish got away! 😤');
  }
  R.escTimer=0;
}

function resetToIdle(){
  gState='idle';
  resFish=null; castAnim=0;
}

// =============================================
// GAME LOOP
// =============================================
let last=0;
function loop(ts){
  const dt=Math.min(ts-last,50); last=ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

function update(dt){
  if(gState==='casting'){
    castAnim=Math.min(1,castAnim+dt/350);
    if(castAnim>=1){ gState='waiting'; biteT=0; }
  }
  if(gState==='waiting'){
    biteT+=dt;
    waitTimer-=dt;
    if(waitTimer<=0) startReel();
  }
  if(gState==='reeling') updateReel(dt);
  if(gState==='result'){ resTimer-=dt; if(resTimer<=0) resetToIdle(); }
}

function updateReel(dt){
  // Notch: hold = float up, release = sink
  const GRAVITY=0.0018*dt, LIFT=0.0032*dt;
  if(R.holding) R.notchVel-=LIFT;
  else          R.notchVel+=GRAVITY;
  R.notchVel*=0.88;
  R.notchY=Math.max(0.01,Math.min(0.99,R.notchY+R.notchVel));

  // Green zone wanders
  R.greenVel+=(Math.random()-0.5)*R.greenSpeed*dt;
  R.greenVel*=0.93;
  const half=R.greenH/2;
  R.greenY=Math.max(half+0.01,Math.min(1-half-0.01,R.greenY+R.greenVel));

  // In zone?
  const inZone = R.notchY>=(R.greenY-half) && R.notchY<=(R.greenY+half);
  if(inZone){
    R.progress=Math.min(1,R.progress+R.fillSpeed*dt);
    R.escTimer=Math.max(0,R.escTimer-3);
  } else {
    R.progress=Math.max(0,R.progress-R.drainSpeed*dt);
    R.escTimer+=1;
    if(R.escTimer>380) endReel(false);
  }
  if(R.progress>=1) endReel(true);
}

// =============================================
// DRAWING HELPERS
// =============================================
let starsArr=null;
function ensureStars(){
  if(starsArr) return;
  starsArr=Array.from({length:90},()=>({
    x:Math.random(),y:Math.random()*0.55,
    r:0.3+Math.random()*1.3,
    b:0.3+Math.random()*0.7,
    sp:0.0008+Math.random()*0.002,
    ph:Math.random()*Math.PI*2,
  }));
}

function rrect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// =============================================
// MAIN DRAW
// =============================================
let waveOff=0;
function draw(){
  waveOff+=0.5;
  ctx.clearRect(0,0,W,H);
  ensureStars();
  drawSky();
  drawStars();
  drawMoon();
  drawWater();
  drawPier();
  drawCharAndRod();
  if(gState==='waiting') drawBobber();
  if(gState==='reeling') drawReelUI();
  if(gState==='result')  drawResult();
  if(gState==='idle')    drawPrompt();
}

function drawSky(){
  const g=ctx.createLinearGradient(0,0,0,waterY());
  g.addColorStop(0,'#010810');
  g.addColorStop(0.6,'#061a30');
  g.addColorStop(1,'#0c3050');
  ctx.fillStyle=g;
  ctx.fillRect(0,0,W,waterY());
}

function drawStars(){
  const t=Date.now()*0.001;
  for(const s of starsArr){
    const a=s.b*(0.5+0.5*Math.sin(t*s.sp*500+s.ph));
    ctx.beginPath();
    ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,225,255,${a})`;
    ctx.fill();
  }
}

function drawMoon(){
  const mx=W*0.80, my=H*0.10, mr=22;
  // glow
  const gg=ctx.createRadialGradient(mx,my,mr*0.4,mx,my,mr*3.5);
  gg.addColorStop(0,'rgba(190,230,160,0.18)');
  gg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gg; ctx.fillRect(mx-mr*4,my-mr*4,mr*8,mr*8);
  // body
  ctx.beginPath(); ctx.arc(mx,my,mr,0,Math.PI*2);
  const mg=ctx.createRadialGradient(mx-6,my-6,2,mx,my,mr);
  mg.addColorStop(0,'#e4f0c8'); mg.addColorStop(0.7,'#c0d890'); mg.addColorStop(1,'#98c060');
  ctx.fillStyle=mg; ctx.fill();
  // craters
  for(const c of [{x:-7,y:-5,r:3.5},{x:5,y:4,r:2.5},{x:-1,y:7,r:2}]){
    ctx.beginPath(); ctx.arc(mx+c.x,my+c.y,c.r,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.13)'; ctx.fill();
  }
}

function waterY(){ return H*0.60; }
function pierY(){ return H*0.57; }
function charBaseX(){ return W*0.25; }
function charBaseY(){ return pierY()-2; }

function drawWater(){
  const wy=waterY();
  const wg=ctx.createLinearGradient(0,wy,0,H);
  wg.addColorStop(0,'#0a2840'); wg.addColorStop(0.5,'#061a2c'); wg.addColorStop(1,'#020c18');
  ctx.fillStyle=wg; ctx.fillRect(0,wy,W,H-wy);
  // shimmer lines
  ctx.save(); ctx.globalAlpha=0.10;
  for(let i=0;i<3;i++){
    ctx.beginPath();
    for(let x=0;x<=W;x+=3){
      const y=wy+18+i*20+Math.sin((x+waveOff*(1+i*0.4))*0.04)*2.5;
      x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.strokeStyle='#4ecdc4'; ctx.lineWidth=1.2; ctx.stroke();
  }
  ctx.restore();
  // surface wave
  ctx.beginPath();
  for(let x=0;x<=W;x+=2){
    const y=wy+Math.sin((x+waveOff)*0.03)*2+Math.sin((x-waveOff*0.7)*0.055)*1.5;
    x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.strokeStyle='rgba(78,205,196,0.55)'; ctx.lineWidth=1.5; ctx.stroke();
  // moon reflection
  const refX=W*0.80;
  ctx.save(); ctx.globalAlpha=0.45;
  for(let i=0;i<7;i++){
    ctx.beginPath();
    ctx.ellipse(refX+(Math.sin(waveOff*0.015+i)*15),wy+8+i*9,13-i*1.2,2.2,0,0,Math.PI*2);
    ctx.fillStyle=`rgba(190,255,140,${0.22-i*0.026})`; ctx.fill();
  }
  ctx.restore();
}

function drawPier(){
  const py=pierY(), wy=waterY();
  const px=W*0.05, pw=W*0.65;
  // posts
  for(const ppx of [px+pw*0.1,px+pw*0.38,px+pw*0.65,px+pw*0.9]){
    ctx.fillStyle='#321a0a';
    ctx.fillRect(ppx-5,py,10,wy+50-py);
    ctx.fillStyle='#241205';
    for(let yy=py;yy<wy+20;yy+=10) ctx.fillRect(ppx-4,yy,8,3);
  }
  // planks
  for(let i=0;i<5;i++){
    ctx.fillStyle=i%2===0?'#5a3820':'#4a2e18';
    ctx.fillRect(px,py-10+i*2,pw,10);
    ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=0.5;
    for(let xg=px+18;xg<px+pw;xg+=20){
      ctx.beginPath(); ctx.moveTo(xg,py-10+i*2); ctx.lineTo(xg,py+i*2); ctx.stroke();
    }
  }
  // rail
  ctx.fillStyle='#3a2010';
  ctx.fillRect(px,py-22,pw,4);
  for(let rp=px+8;rp<px+pw-8;rp+=26){
    ctx.fillRect(rp,py-22,4,24);
  }
}

function getRodTip(){
  // In resting/cast state, rod tip position
  const bx=charBaseX(), by=charBaseY();
  const angle = gState==='idle' ? 0.35 : -0.55;
  const handX=bx+12, handY=by-32;
  const rodLen=42;
  return {
    hx:handX, hy:handY,
    tx:handX+Math.cos(angle)*rodLen,
    ty:handY+Math.sin(angle)*rodLen,
  };
}

function bobberPos(){
  const wy=waterY();
  const bx=W*0.63;
  const by=wy+2+Math.sin(biteT*0.004)*3;
  return {x:bx,y:by};
}

function drawCharAndRod(){
  const bx=charBaseX(), by=charBaseY();
  const t=Date.now()*0.001;
  const bob=gState==='waiting'?Math.sin(t*2)*1.2:0;

  ctx.save();
  ctx.translate(bx,by+bob);

  // shadow
  ctx.beginPath(); ctx.ellipse(0,3,9,2.5,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fill();

  // boots
  ctx.fillStyle='#231003';
  ctx.fillRect(-8,-8,7,10); ctx.fillRect(2,-8,7,10);

  // pants
  ctx.fillStyle='#1a3060';
  ctx.fillRect(-8,-22,18,16);

  // jacket
  ctx.fillStyle='#802020';
  ctx.fillRect(-9,-38,20,18);
  ctx.fillStyle='#a03030';
  ctx.fillRect(-9,-34,3,12); ctx.fillRect(8,-34,3,12);

  // neck
  ctx.fillStyle='#c89060';
  ctx.fillRect(-3,-44,7,8);

  // head
  ctx.beginPath(); ctx.arc(0,-52,9,0,Math.PI*2);
  ctx.fillStyle='#c89060'; ctx.fill();

  // hat brim + cap
  ctx.fillStyle='#182018';
  ctx.fillRect(-11,-60,24,5);
  ctx.fillRect(-7,-76,16,18);

  // eyes
  ctx.fillStyle='#100500';
  ctx.fillRect(-5,-55,3,3);
  ctx.fillRect(2,-55,3,3);

  ctx.restore();

  // ROD
  const rod=getRodTip();
  ctx.save();
  ctx.strokeStyle='#7a5530'; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(rod.hx,rod.hy+bob); ctx.lineTo(rod.tx,rod.ty+bob); ctx.stroke();
  // guide rings
  ctx.strokeStyle='#b88040'; ctx.lineWidth=1.8;
  for(let t2=0.3;t2<=0.85;t2+=0.28){
    const gx=rod.hx+(rod.tx-rod.hx)*t2, gy=rod.hy+(rod.ty-rod.hy)*t2+bob;
    ctx.beginPath(); ctx.arc(gx,gy,2.2,0,Math.PI*2); ctx.stroke();
  }
  ctx.restore();

  // LINE (when cast/waiting/reeling)
  if(gState==='waiting'||gState==='reeling'){
    const bp=bobberPos();
    ctx.save();
    ctx.strokeStyle='rgba(210,235,255,0.55)'; ctx.lineWidth=1.2;
    ctx.beginPath();
    ctx.moveTo(rod.tx,rod.ty+bob);
    const cpx=(rod.tx+bp.x)/2;
    const cpy=Math.max(rod.ty+bob,bp.y)+18;
    ctx.quadraticCurveTo(cpx,cpy,bp.x,bp.y);
    ctx.stroke();
    ctx.restore();
  }
}

function drawBobber(){
  const bp=bobberPos();
  const t=Date.now()*0.001;
  // ripple
  ctx.save(); ctx.globalAlpha=0.28+0.2*Math.sin(t*3.5);
  ctx.beginPath(); ctx.ellipse(bp.x,bp.y+3,13+Math.sin(t*4)*2,4,0,0,Math.PI*2);
  ctx.strokeStyle='#4ecdc4'; ctx.lineWidth=1; ctx.stroke();
  ctx.restore();
  // bottom red
  ctx.beginPath(); ctx.arc(bp.x,bp.y+3,6,0,Math.PI);
  ctx.fillStyle='#cc2222'; ctx.fill();
  // top white
  ctx.beginPath(); ctx.arc(bp.x,bp.y+3,6,Math.PI,0);
  ctx.fillStyle='#eeeeee'; ctx.fill();
  // divider
  ctx.beginPath(); ctx.moveTo(bp.x-6,bp.y+3); ctx.lineTo(bp.x+6,bp.y+3);
  ctx.strokeStyle='#444'; ctx.lineWidth=0.8; ctx.stroke();
  // wait text
  if(Math.floor(Date.now()/600)%2===0){
    ctx.font=`${Math.floor(H*0.024)}px VT323,monospace`;
    ctx.textAlign='center'; ctx.fillStyle='rgba(78,205,196,0.7)';
    ctx.fillText('...',bp.x,bp.y-16);
  }
}

function drawReelUI(){
  // dim scene
  ctx.fillStyle='rgba(0,0,0,0.38)'; ctx.fillRect(0,0,W,H);

  // Fish shadow rising in water
  const wy=waterY();
  const progress=R.progress;
  const fy=wy+50+(1-progress)*90;
  ctx.save(); ctx.globalAlpha=0.12+progress*0.3;
  ctx.font=`${Math.floor(H*0.07)}px serif`; ctx.textAlign='center';
  ctx.fillText(currentFish.e,W*0.6,fy);
  ctx.restore();

  // Layout: two bars on the right side
  const barW=26, barH=H*0.44;
  const barY=H*0.21;
  const bar1X=W*0.76;  // notch bar
  const bar2X=bar1X+barW+16; // progress bar

  drawNotchBar(bar1X,barY,barW,barH);
  drawFillBar(bar2X,barY,barW,barH,progress);

  // Instruction text
  ctx.font=`${Math.floor(H*0.027)}px VT323,monospace`;
  ctx.textAlign='center'; ctx.fillStyle='rgba(180,220,255,0.5)';
  ctx.fillText('HOLD ↑ · RELEASE ↓',W/2,barY+barH+26);

  // Fish name top-left
  ctx.font=`${Math.floor(H*0.030)}px VT323,monospace`;
  ctx.textAlign='left'; ctx.fillStyle=RC[currentFish.r];
  ctx.fillText(currentFish.e+' '+currentFish.name, W*0.06, barY+20);
  ctx.font=`${Math.floor(H*0.024)}px VT323,monospace`;
  ctx.fillStyle='rgba(180,220,255,0.4)';
  ctx.fillText(RL[currentFish.r], W*0.06, barY+44);
}

function drawNotchBar(bx,by,bw,bh){
  // bg
  rrect(bx,by,bw,bh,5);
  ctx.fillStyle='#06121f'; ctx.fill();
  ctx.strokeStyle='#1a3a5a'; ctx.lineWidth=1.5; ctx.stroke();

  // tick marks
  ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1;
  for(let t=0.1;t<1;t+=0.1){
    const ty=by+t*bh;
    ctx.beginPath(); ctx.moveTo(bx+4,ty); ctx.lineTo(bx+bw-4,ty); ctx.stroke();
  }

  // green zone
  const half=R.greenH/2;
  const gTop=by+(R.greenY-half)*bh;
  const gBot=by+(R.greenY+half)*bh;
  const gH=gBot-gTop;
  rrect(bx+2,gTop,bw-4,gH,3);
  ctx.fillStyle='rgba(60,210,100,0.88)'; ctx.fill();
  // glow
  ctx.save();
  ctx.shadowColor='#40e070'; ctx.shadowBlur=14;
  rrect(bx+2,gTop,bw-4,gH,3);
  ctx.fillStyle='rgba(60,210,100,0.5)'; ctx.fill();
  ctx.restore();

  // notch
  const ny=by+R.notchY*bh-12;
  const half2=R.greenH/2;
  const inZone=R.notchY>=(R.greenY-half2)&&R.notchY<=(R.greenY+half2);
  rrect(bx+2,ny,bw-4,24,4);
  ctx.fillStyle=inZone?'#ffffff':'#ff9944'; ctx.fill();
  if(inZone){
    ctx.save(); ctx.shadowColor='#fff'; ctx.shadowBlur=10;
    rrect(bx+2,ny,bw-4,24,4); ctx.fillStyle='#fff'; ctx.fill();
    ctx.restore();
  }
  // notch center line
  ctx.strokeStyle=inZone?'rgba(0,0,0,0.25)':'rgba(255,150,0,0.6)';
  ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(bx+5,ny+12); ctx.lineTo(bx+bw-5,ny+12); ctx.stroke();

  // label
  ctx.font=`${Math.floor(H*0.020)}px VT323,monospace`;
  ctx.textAlign='center'; ctx.fillStyle='#4ecdc4';
  ctx.fillText('REEL',bx+bw/2,by-9);
}

function drawFillBar(bx,by,bw,bh,progress){
  // bg
  rrect(bx,by,bw,bh,5);
  ctx.fillStyle='#06121f'; ctx.fill();
  ctx.strokeStyle='#1a3a5a'; ctx.lineWidth=1.5; ctx.stroke();

  // segment lines
  ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1.5;
  for(let s=1;s<5;s++){
    const sy=by+bh-(bh*s/5);
    ctx.beginPath(); ctx.moveTo(bx+3,sy); ctx.lineTo(bx+bw-3,sy); ctx.stroke();
  }

  // fill (bottom to top)
  const fH=bh*progress;
  if(fH>2){
    const gy2=ctx.createLinearGradient(0,by+bh-fH,0,by+bh);
    gy2.addColorStop(0,'#f7c948'); gy2.addColorStop(1,'#ff7700');
    rrect(bx+3,by+bh-fH,bw-6,fH,3);
    ctx.fillStyle=gy2; ctx.fill();
    ctx.save();
    ctx.shadowColor='#f7c948'; ctx.shadowBlur=16;
    rrect(bx+3,by+bh-fH,bw-6,fH,3);
    ctx.fillStyle='rgba(247,201,72,0.35)'; ctx.fill();
    ctx.restore();
  }

  // label
  ctx.font=`${Math.floor(H*0.020)}px VT323,monospace`;
  ctx.textAlign='center'; ctx.fillStyle='#f7c948';
  ctx.fillText('CATCH',bx+bw/2,by-9);
  // pct
  ctx.font=`${Math.floor(H*0.020)}px VT323,monospace`;
  ctx.fillStyle='rgba(255,255,255,0.45)';
  ctx.fillText(Math.floor(progress*100)+'%',bx+bw/2,by+bh+18);
}

function drawResult(){
  const f=resFish; if(!f) return;
  const pw=Math.min(W*0.80,340), ph=H*0.40;
  const px=(W-pw)/2, py=(H-ph)/2-10;
  // backdrop glow
  ctx.save();
  ctx.shadowColor=resSuccess?RC[f.r]:'#cc4444'; ctx.shadowBlur=40;
  rrect(px,py,pw,ph,10); ctx.fillStyle='#020e1c'; ctx.fill();
  ctx.restore();
  // border
  rrect(px,py,pw,ph,10);
  ctx.strokeStyle=resSuccess?RC[f.r]:'#cc4444'; ctx.lineWidth=2; ctx.stroke();
  // top bar
  rrect(px,py,pw,4,2); ctx.fillStyle=resSuccess?RC[f.r]:'#cc4444'; ctx.fill();

  ctx.textAlign='center';
  if(resSuccess){
    const t=Date.now()*0.001;
    ctx.font=`${Math.floor(pw*0.22)}px serif`;
    ctx.fillText(f.e,W/2,py+ph*0.34+Math.sin(t*2)*4);
    ctx.font=`bold ${Math.floor(pw*0.07)}px VT323,monospace`;
    ctx.fillStyle=RC[f.r];
    ctx.fillText(f.name,W/2,py+ph*0.54);
    ctx.font=`${Math.floor(pw*0.057)}px VT323,monospace`;
    ctx.globalAlpha=0.75; ctx.fillText(RL[f.r].toUpperCase(),W/2,py+ph*0.65); ctx.globalAlpha=1;
    ctx.font=`${Math.floor(pw*0.053)}px VT323,monospace`;
    ctx.fillStyle='#f7c948';
    ctx.fillText('Worth '+fmt(f.v)+'g',W/2,py+ph*0.77);
    ctx.font=`${Math.floor(pw*0.043)}px VT323,monospace`;
    ctx.fillStyle='#6a9ab0';
    ctx.fillText(f.desc,W/2,py+ph*0.88);
  } else {
    ctx.font=`${Math.floor(pw*0.18)}px serif`;
    ctx.fillText('💨',W/2,py+ph*0.38);
    ctx.font=`${Math.floor(pw*0.075)}px VT323,monospace`;
    ctx.fillStyle='#cc4444';
    ctx.fillText('It got away!',W/2,py+ph*0.58);
    ctx.font=`${Math.floor(pw*0.053)}px VT323,monospace`;
    ctx.fillStyle='#6a9ab0';
    ctx.fillText('Keep trying...',W/2,py+ph*0.74);
  }
  // tap to continue (pulse)
  const a=0.45+0.45*Math.sin(Date.now()*0.003);
  ctx.font=`${Math.floor(W*0.040)}px VT323,monospace`;
  ctx.fillStyle=`rgba(78,205,196,${a})`;
  ctx.fillText('Tap to continue',W/2,py+ph+26);
}

function drawPrompt(){
  const a=0.4+0.4*Math.sin(Date.now()*0.002);
  ctx.save(); ctx.globalAlpha=a;
  ctx.font=`${Math.floor(W*0.046)}px VT323,monospace`;
  ctx.textAlign='center'; ctx.fillStyle='#4ecdc4';
  ctx.fillText('Tap to cast',W/2,H*0.87);
  ctx.restore();
}

// PANELS
// =============================================
let currentTab='game';
function openTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['game','inv','rods','lb'][i]===tab);
  });
  document.querySelectorAll('.side-panel').forEach(p=>p.classList.remove('open'));
  currentTab=tab;
  if(tab==='inv'){document.getElementById('panel-inv').classList.add('open');renderInv();}
  if(tab==='rods'){document.getElementById('panel-rods').classList.add('open');renderRods();}
  if(tab==='lb'){document.getElementById('panel-lb').classList.add('open');loadLB();}
}

function renderInv(){
  const g=document.getElementById('inv-grid');
  g.innerHTML='';
  const caught=FISH.filter(f=>(S.inventory[f.id]||0)>0);
  if(!caught.length){g.innerHTML='<div class="empty-msg">No fish yet!</div>';return;}
  const order=['mythic','legendary','epic','rare','uncommon','common'];
  caught.sort((a,b)=>order.indexOf(a.r)-order.indexOf(b.r)||b.v-a.v);
  for(const f of caught){
    const c=S.inventory[f.id]||0;
    const d=document.createElement('div');
    d.className='inv-card'; d.style.setProperty('--rc',RC[f.r]);
    d.innerHTML=`<div class="inv-emoji">${f.e}</div><div class="inv-name">${f.name}</div><div class="inv-count" style="color:${RC[f.r]}">×${c}</div><div class="inv-val">${fmt(f.v)}g ea</div><button class="inv-sell" onclick="sellFish('${f.id}')">Sell</button>`;
    g.appendChild(d);
  }
}
function sellFish(id){
  const f=FISH.find(x=>x.id===id),c=S.inventory[id]||0;
  if(!f||!c)return;
  S.inventory[id]=0;const earned=f.v*c;S.gold+=earned;S.totalEarned+=earned;
  showToast(`Sold ${c}× ${f.name} for ${fmt(earned)}g`);save();updateHUD();renderInv();
}
function sellAll(){
  let total=0;
  for(const[id,c]of Object.entries(S.inventory)){if(c>0){const f=FISH.find(x=>x.id===id);if(f){total+=f.v*c;S.inventory[id]=0;}}}
  S.gold+=total;S.totalEarned+=total;
  showToast(`Sold all fish for ${fmt(total)}g!`);save();updateHUD();renderInv();
}
function renderRods(){
  const list=document.getElementById('rods-list');list.innerHTML='';
  for(const rod of RODS){
    const owned=S.ownedRods.includes(rod.id),eq=S.equippedRod===rod.id;
    const d=document.createElement('div');
    d.className=`rod-card${eq?' equipped':owned?' owned':''}`;
    let act;
    if(eq) act=`<button class="rod-act eqd" disabled>✓ Equipped</button>`;
    else if(owned) act=`<button class="rod-act equip" onclick="equipRod('${rod.id}')">Equip</button>`;
    else{
      const can=S.gold>=rod.price;
      act=`<div style="font-family:'VT323',monospace;font-size:0.85rem;color:#f7c948;margin-bottom:3px">${fmt(rod.price)}g</div><button class="rod-act buy" onclick="buyRod('${rod.id}')" ${can?'':'disabled'}>${can?'Buy':'Need '+fmt(rod.price)+'g'}</button>`;
    }
    d.innerHTML=`<div class="rod-icon-big">${rod.e}</div><div class="rod-info"><div class="rod-nm">${rod.name}</div><div class="rod-dsc">${rod.desc}</div><div class="rod-tags"><span class="rod-tag">Luck ×${rod.luck}</span><span class="rod-tag">Speed ×${rod.speed}</span><span class="rod-tag">Zone ${Math.round(rod.greenH*100)}%</span></div></div><div style="flex-shrink:0;text-align:right">${act}</div>`;
    list.appendChild(d);
  }
}
function buyRod(id){
  const rod=RODS.find(r=>r.id===id);
  if(!rod||S.gold<rod.price){showToast('Not enough gold!');return;}
  S.gold-=rod.price;S.ownedRods.push(id);S.equippedRod=id;
  save();updateHUD();renderRods();showToast(rod.e+' '+rod.name+' acquired!');
}
function equipRod(id){
  S.equippedRod=id;save();updateHUD();renderRods();
  const rod=RODS.find(r=>r.id===id);showToast(rod.e+' '+rod.name+' equipped!');
}

async function loadLB(){
  const el=document.getElementById('lb-rows');
  el.innerHTML='<div class="empty-msg">Loading...</div>';
  try{
    const res=await window.storage.list('lb3:');
    const keys=res?.keys||[];
    const entries=[];
    for(const k of keys){
      try{const r=await window.storage.get(k,true);if(r?.value)entries.push(JSON.parse(r.value));}catch(e){}
    }
    entries.sort((a,b)=>b.score-a.score);
    renderLBRows(entries);
  }catch(e){el.innerHTML='<div class="empty-msg">Could not load.</div>';}
}
function renderLBRows(entries){
  const el=document.getElementById('lb-rows');el.innerHTML='';
  if(!entries.length){el.innerHTML='<div class="empty-msg">No scores yet!</div>';return;}
  const myName=localStorage.getItem('pl3_name');
  const rc=['#ffd700','#c0c0c0','#cd7f32'];
  entries.forEach((e,i)=>{
    const row=document.createElement('div');
    const isMe=myName&&e.name===myName;
    row.className=`lb-row${isMe?' me':''}`;
    const rankStr=i<3?`<span style="color:${rc[i]}">${['①','②','③'][i]}</span>`:`<span style="color:#4a6a7a">#${i+1}</span>`;
    row.innerHTML=`<div class="lb-rank-num">${rankStr}</div><div><div class="lb-nm">${esc(e.name)}${isMe?' <span style="color:#f7c948;font-size:0.8rem">(you)</span>':''}</div><div style="font-size:0.75rem;color:#4a6a7a;font-family:'VT323',monospace">${fmt(e.caught)} fish · ${esc(e.rod||'?')}</div></div><div class="lb-sc">${fmt(e.score)}g</div>`;
    el.appendChild(row);
  });
}
async function submitLB(){
  const name=document.getElementById('lb-name').value.trim();
  if(!name){showToast('Enter your angler name!');return;}
  localStorage.setItem('pl3_name',name);
  const rod=getRod();
  const payload={name,score:netWorth(),caught:S.totalCaught,rod:rod.name,ts:Date.now()};
  try{
    const key=`lb3:${name.toLowerCase().replace(/[^a-z0-9]/g,'_')}`;
    await window.storage.set(key,JSON.stringify(payload),true);
    showToast('Score submitted! 🏆');loadLB();
  }catch(e){showToast('Submission failed.');}
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// =============================================
// TOAST
// =============================================
let toastT;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2800);
}

// =============================================
// BOOT
// =============================================
load();
updateHUD();
requestAnimationFrame(loop);
</script>
